version: '3.8'
services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: task_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Ariel@Password123!
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: task_db_init
    depends_on:
      - database
    entrypoint: >
      /bin/bash -c "
      echo 'Waiting for SQL Server to start...';
      for i in {1..50}; do
        /opt/mssql-tools18/bin/sqlcmd -S database -U sa -P 'Ariel@Password123!' -C -Q 'SELECT 1' &> /dev/null;
        if [ $$? -eq 0 ]; then
          echo 'SQL Server is ready!';
          break;
        fi
        echo 'Still waiting for SQL Server...';
        sleep 2;
      done;
      /opt/mssql-tools18/bin/sqlcmd -S database -U sa -P 'Ariel@Password123!' -C -Q \"IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = 'task_db') CREATE DATABASE task_db;\";
      echo 'Database task_db created.';
      /opt/mssql-tools18/bin/sqlcmd -S database -U sa -P 'Ariel@Password123!' -C -d task_db -i /usr/config/schema.sql;
      echo 'Schema and seed data applied.';"
    volumes:
      - ./schema.sql:/usr/config/schema.sql

volumes:
  mssql_data:
