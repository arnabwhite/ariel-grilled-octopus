<div class="min-h-screen bg-white text-[#37352f] flex">
  
  <aside class="w-64 notion-sidebar flex flex-col justify-between shrink-0 h-screen sticky top-0 z-30">
    <div class="flex-1 flex flex-col min-h-0">
      
      <div class="px-4 border-b border-[rgba(55,53,47,0.09)] flex items-center gap-2.5 bg-[#f7f7f5] notion-top-bar shrink-0">
        <div class="h-6 w-6 rounded bg-[#37352f] text-white flex items-center justify-center font-bold shrink-0 shadow-sm">
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
          </svg>
        </div>
        <div class="min-w-0">
          <div class="text-xs font-bold text-[#37352f] truncate">Ariel Workspace</div>
          <div class="text-[10px] text-[#787774] truncate">{{ authService.currentUser()?.email }}</div>
        </div>
      </div>

      <nav class="flex-1 overflow-y-auto px-2 py-3 space-y-4">
        
        <div class="space-y-1">
          <div class="px-3 text-[10px] font-bold tracking-wider text-[#787774] uppercase mb-1.5">Views</div>
          <button 
            (click)="taskList.toggleView(true)"
            class="w-full flex items-center gap-2.5 px-3 py-1.5 rounded text-sm text-left hover:bg-[rgba(55,53,47,0.04)] cursor-pointer transition-colors"
            [class.bg-[rgba(55,53,47,0.06)]]="taskList.isCardView()"
            [class.font-semibold]="taskList.isCardView()"
          >
            <svg class="h-4 w-4 text-[#787774] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
            </svg>
            <span class="truncate">Board View</span>
          </button>
          <button 
            (click)="taskList.toggleView(false)"
            class="w-full flex items-center gap-2.5 px-3 py-1.5 rounded text-sm text-left hover:bg-[rgba(55,53,47,0.04)] cursor-pointer transition-colors"
            [class.bg-[rgba(55,53,47,0.06)]]="!taskList.isCardView()"
            [class.font-semibold]="!taskList.isCardView()"
          >
            <svg class="h-4 w-4 text-[#787774] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            <span class="truncate">Table View</span>
          </button>
        </div>

      </nav>
    </div>

    <div class="p-3 border-t border-[rgba(55,53,47,0.09)] space-y-1.5 bg-[#f7f7f5]">
      <div class="px-2 py-1 rounded bg-[rgba(55,53,47,0.05)] text-[10px] font-bold text-[#787774] text-center tracking-wider uppercase">
        {{ authService.currentUser()?.role }}
      </div>
      <button 
        (click)="logout()" 
        class="w-full flex items-center justify-center gap-2 py-2 rounded text-xs font-semibold text-[#787774] hover:text-[#37352f] hover:bg-[rgba(55,53,47,0.04)] border border-[rgba(55,53,47,0.09)] transition-colors cursor-pointer"
      >
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <main class="flex-1 min-w-0 h-screen overflow-y-auto flex flex-col bg-white">
    <header class="px-8 flex justify-between items-center text-xs text-[#787774] border-b border-[rgba(55,53,47,0.09)] sticky top-0 bg-white z-20 notion-top-bar shrink-0">
      <div class="flex items-center gap-1">
        <span>Workspace</span>
        <span class="text-[#e3e2e0]">/</span>
        <span class="font-semibold text-[#37352f]">Tasks</span>
      </div>
      <div class="flex items-center gap-3">
        <span class="font-medium text-[#787774]">Updated just now</span>
      </div>
    </header>

    <div class="flex-1 p-8 sm:p-12 max-w-6xl w-full mx-auto space-y-6">
      
      <div class="space-y-4">
        <h1 class="text-3xl font-extrabold tracking-tight text-[#37352f]">Tasks</h1>
      </div>

      <app-task-list #taskList></app-task-list>
    </div>
  </main>
</div>
