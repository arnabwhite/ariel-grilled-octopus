<dialog #taskDialog (close)="onCancel()" class="w-full max-w-xl">
  <div class="w-full bg-white border border-[rgba(55,53,47,0.16)] rounded-lg shadow-[rgba(15,15,15,0.1)_0px_10px_30px_-5px,_rgba(15,15,15,0.04)_0px_1px_4px] p-8 relative text-[#37352f]">
    
    <div class="flex items-center justify-between pb-3 border-b border-[rgba(55,53,47,0.06)] mb-6 text-xs text-[#787774]">
      <div class="flex items-center gap-1">
        <span>Tasks</span>
        <span>/</span>
        <span class="font-semibold text-[#37352f]">{{ (task && task.id !== undefined) ? 'Edit Task' : 'New Task' }}</span>
      </div>
      <button 
        (click)="onCancel()"
        class="text-[#787774] hover:text-[#37352f] hover:bg-[rgba(55,53,47,0.04)] p-1 rounded transition-colors cursor-pointer"
        type="button"
      >
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div class="space-y-1">
        <input 
          type="text" 
          formControlName="title"
          placeholder="Untitled"
          class="w-full text-2.5xl font-bold tracking-tight text-[#37352f] placeholder-[rgba(55,53,47,0.2)] focus:outline-none focus:bg-[rgba(55,53,47,0.01)] py-1 px-1 rounded transition-colors border-none"
        />
        <p class="text-rose-500 text-[10px] min-h-[14px] px-1 font-medium">{{ titleErrors }}</p>
      </div>

      <div class="space-y-3.5 border-y border-[rgba(55,53,47,0.06)] py-4 my-2 text-xs">
        
        <div class="flex items-center">
          <div class="w-32 text-[#787774] flex items-center gap-1.5 shrink-0">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
            </svg>
            <span>Status</span>
          </div>
          <div class="flex-1">
            <select 
              formControlName="status"
              class="border-none rounded px-2.5 py-1 text-xs font-bold tracking-wide focus:outline-none transition-all cursor-pointer"
              [class.tag-todo]="taskForm.get('status')?.value === 'TODO'"
              [class.tag-in-progress]="taskForm.get('status')?.value === 'IN_PROGRESS'"
              [class.tag-done]="taskForm.get('status')?.value === 'DONE'"
            >
              <option value="TODO" class="bg-white text-amber-600 font-semibold">To Do</option>
              <option value="IN_PROGRESS" class="bg-white text-blue-600 font-semibold">In Progress</option>
              <option value="DONE" class="bg-white text-green-600 font-semibold">Done</option>
            </select>
          </div>
        </div>

        <div class="flex items-center">
          <div class="w-32 text-[#787774] flex items-center gap-1.5 shrink-0">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span>Assignee</span>
          </div>
          <div class="flex-1">
            <select 
              formControlName="assignedToEmail"
              class="border-none rounded bg-[#f7f7f5] hover:bg-[rgba(55,53,47,0.06)] px-2.5 py-1 text-xs text-[#37352f] font-medium focus:outline-none transition-all cursor-pointer"
            >
              <option value="" disabled>Empty</option>
              @for (email of assignees(); track email) {
                <option [value]="email" class="bg-white text-[#37352f] font-medium">
                  {{ email }}
                </option>
              }
            </select>
            <p class="text-rose-500 text-[10px] min-h-[14px] mt-1 font-medium">{{ assignedErrors }}</p>
          </div>
        </div>

        <div *ngIf="task && task.id !== undefined" class="flex items-center">
          <div class="w-32 text-[#787774] flex items-center gap-1.5 shrink-0">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span>Created time</span>
          </div>
          <div class="flex-1 text-[#787774] px-1 font-medium">
            {{ task.createdAt | date:'medium' }}
          </div>
        </div>
      </div>

      <div class="space-y-1">
        <textarea 
          formControlName="description"
          placeholder="Add a description or notes for this task..."
          rows="5"
          class="w-full text-sm text-[#37352f] placeholder-[rgba(55,53,47,0.3)] focus:outline-none focus:bg-[rgba(55,53,47,0.01)] py-1 px-1 rounded transition-colors border-none resize-none"
        ></textarea>
      </div>

      <div class="flex items-center justify-end gap-2.5 pt-4 border-t border-[rgba(55,53,47,0.06)]">
        <button 
          type="button" 
          (click)="onCancel()"
          class="px-3 py-1.5 text-xs font-semibold text-[#787774] hover:text-[#37352f] hover:bg-[rgba(55,53,47,0.04)] rounded border border-[rgba(55,53,47,0.09)] transition-colors cursor-pointer"
        >
          Cancel
        </button>
        <button 
          type="submit" 
          [disabled]="taskForm.invalid"
          class="px-3 py-1.5 text-xs font-semibold text-white bg-[#191919] hover:bg-[#252525] disabled:bg-[rgba(55,53,47,0.15)] disabled:text-[#a9a9a7] disabled:cursor-not-allowed rounded shadow-sm transition-colors cursor-pointer"
        >
          Save
        </button>
      </div>
    </form>
  </div>
</dialog>
